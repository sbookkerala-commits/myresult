
name: sbook_lottery
description: "Havells"
publish_to: 'none'
version: 1.0.0+2002

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Updated to 3.0.0 to fix the ViewConfiguration 'size' error in Flutter 3.19+
  screenshot: ^3.0.0

  # Share and Path Provider
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  # API + Local DB + Intl
  http: ^1.2.2
  sqflite: ^2.3.3+1
  path: ^1.9.0
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  webview_flutter: ^4.8.0
  image_picker: ^1.0.7
  font_awesome_flutter: ^10.8.0
  syncfusion_flutter_pdf: ^33.2.13
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#E31E24"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png

